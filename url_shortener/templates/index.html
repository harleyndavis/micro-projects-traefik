<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .result-value {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .short-link {
            flex: 1;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            color: #667eea;
            font-weight: 600;
            word-break: break-all;
            font-size: 14px;
        }

        .copy-btn {
            padding: 8px 16px;
            width: auto;
            background: #667eea;
            color: white;
            font-size: 12px;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .link-item {
            background: white;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            display: none;
        }

        .link-item.show {
            display: block;
        }

        .link-original {
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            word-break: break-all;
            font-weight: 500;
        }

        .link-short {
            color: #667eea;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .link-stats {
            color: #999;
            font-size: 12px;
            display: flex;
            gap: 16px;
        }

        .stats-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            text-align: center;
        }

        .stats-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stats-label {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 4px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .qr-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        #qrDisplay canvas, #qrDisplay img { display: block; }

        .qr-actions {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .qr-link-btn {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <p class="subtitle">Shorten your long URLs in seconds</p>

        <form id="shortenForm">
            <div class="form-group">
                <label for="urlInput">Enter your URL</label>
                <input
                    type="url"
                    id="urlInput"
                    placeholder="https://example.com/very/long/url"
                    required
                >
            </div>
            <button type="submit">Shorten URL</button>
            <div class="loading" id="loading">
                <span class="spinner"></span>Shortening...
            </div>
            <div class="error" id="error"></div>
        </form>

        <div class="result" id="result">
            <div class="result-label">Your shortened link</div>
            <div class="result-value">
                <input type="text" id="shortUrl" class="short-link" readonly>
                <button class="copy-btn" onclick="copyToClipboard()">Copy</button>
            </div>
            <div class="qr-section">
                <div class="result-label">QR Code</div>
                <div id="qrDisplay"></div>
                <div class="qr-actions">
                    <button class="copy-btn" onclick="downloadQRCode()">Download PNG</button>
                    <a id="qrFullLink" href="/qr/" target="_blank" class="copy-btn qr-link-btn">Full Generator</a>
                </div>
            </div>
        </div>

        <div class="stats-box" id="statsBox">
            <div>
                <div class="stats-number" id="totalLinks">0</div>
                <div class="stats-label">Total Links</div>
            </div>
            <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0;">
                <div class="stats-number" id="totalClicks">0</div>
                <div class="stats-label">Total Clicks</div>
            </div>
            <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0;">
                <div class="stats-number" id="totalQrScans">0</div>
                <div class="stats-label">QR Scans</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const API_BASE = '/api';
        let qrInstance = null;

        document.getElementById('shortenForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value;
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            errorDiv.classList.remove('show');
            loadingDiv.classList.add('show');

            try {
                const response = await fetch(`${API_BASE}/links/shorten/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken'),
                    },
                    body: JSON.stringify({ original_url: url })
                });

                if (!response.ok) {
                    throw new Error('Failed to shorten URL');
                }

                const data = await response.json();
                document.getElementById('shortUrl').value = data.short_url;
                resultDiv.classList.add('show');
                generateQRCode(data.short_url);
                urlInput.value = '';

                updateStats();
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message;
                errorDiv.classList.add('show');
            } finally {
                loadingDiv.classList.remove('show');
            }
        });

        function generateQRCode(shortUrl) {
            const trackedUrl = shortUrl + '?src=qr';
            const container = document.getElementById('qrDisplay');
            container.innerHTML = '';
            qrInstance = new QRCode(container, {
                text: trackedUrl,
                width: 180,
                height: 180,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M,
            });
            document.getElementById('qrFullLink').href = '/qr/?url=' + encodeURIComponent(trackedUrl);
        }

        function downloadQRCode() {
            const canvas = document.querySelector('#qrDisplay canvas');
            if (!canvas) return;
            const a = document.createElement('a');
            a.download = 'qrcode.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        function copyToClipboard() {
            const shortUrl = document.getElementById('shortUrl');
            shortUrl.select();
            document.execCommand('copy');

            const btn = event.target;
            const original = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = original;
            }, 2000);
        }

        async function updateStats() {
            try {
                const response = await fetch(`${API_BASE}/links/stats/`);
                const data = await response.json();
                document.getElementById('totalLinks').textContent = data.total_links;
                document.getElementById('totalClicks').textContent = data.total_clicks;
                document.getElementById('totalQrScans').textContent = data.total_qr_scans;
            } catch (error) {
                console.error('Failed to fetch stats:', error);
            }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Load stats on page load
        updateStats();
    </script>
</body>
</html>
